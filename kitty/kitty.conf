# vim:fileencoding=utf-8:foldmethod=marker
dynamic_background_opacity yes
background_blur 50
dynamic_background_blur yes

window_border_width 0

#draw_minimal_borders yes

cursor_trail 3
cursor_trail_decay 0.1 0.4
confirm_os_window_close -1

font_size 15.0

map cmd+h neighboring_window left
map cmd+j neighboring_window down
map cmd+k neighboring_window up
map cmd+l neighboring_window right

map cmd+shift+h resize_window narrower 5
map cmd+shift+l resize_window wider 5
map cmd+shift+k resize_window taller 5
map cmd+shift+j resize_window shorter 5

map ctrl+w close_window

include ~/.config/kitty/themes/nord-light.conf


# -----------------------------
# Light Nord-inspired Kitty Config
# -----------------------------

# Font
font_family "SMono Nerd Font"
font_size 15.0

# Window
hide_window_decorations titlebar-only
macos_window_corner_radius 12
window_padding_x 0
window_padding_y 0
background_opacity 0.25
background_blur_radius 20

# Colors — light Nord palette
foreground   #2E3440
background   #FFFFFF
cursor       #5E81AC

# ANSI colors
color0       #3B4252
color1       #BF616A
color2       #A3BE8C
color3       #EBCB8B
color4       #81A1C1
color5       #B48EAD
color6       #88C0D0
color7       #4C566A
color8       #D8DEE9
color9       #BF616A
color10      #A3BE8C
color11      #EBCB8B
color12      #81A1C1
color13      #B48EAD
color14      #8FBCBB
color15      #2E3440

# Tab bar — light style
active_tab_background   #ECEFF4
active_tab_foreground   #2E3440
inactive_tab_background #E5E9F0
inactive_tab_foreground #4C566A
tab_bar_style powerline
tab_powerline_style round 
# Mouse & cursor
mouse_hide_while_typing yes
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_shape block 
# Keybindings (optional)
map ctrl+w close_window
