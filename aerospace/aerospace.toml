[mode.main.binding]

    cmd-alt-h = [] # Disable "hide others"
    cmd-h = [] # Disable "hide application"

    #layout switcher
    ctrl-alt-cmd-semicolon = 'layout floating tiling'

    #moving alignment
    ctrl-alt-cmd-h = 'focus left'
    ctrl-alt-cmd-j = 'focus down'
    ctrl-alt-cmd-k = 'focus up'
    ctrl-alt-cmd-l = 'focus right'

    #focus
    ctrl-alt-cmd-shift-h = 'move left'
    ctrl-alt-cmd-shift-j = 'move down'
    ctrl-alt-cmd-shift-k = 'move up'
    ctrl-alt-cmd-shift-l = 'move right'

    #resizing
    ctrl-alt-cmd-minus = 'resize smart -50'
    ctrl-alt-cmd-equal = 'resize smart +50'
    ctrl-alt-cmd-f = 'fullscreen'
    ctrl-alt-cmd-shift-f = 'macos-native-fullscreen'

    #the super cool term thing
    ctrl-alt-cmd-y = 'join-with right'

    # ctrl-alt-cmd-shift-" = 'layout floating tiling' # 'floating toggle' in i3
    # (doesnt work idk)

    ctrl-alt-cmd-1 = 'workspace 1'
    ctrl-alt-cmd-2 = 'workspace 2'
    ctrl-alt-cmd-3 = 'workspace 3'
    ctrl-alt-cmd-4 = 'workspace 4'
    ctrl-alt-cmd-5 = 'workspace 5'
    ctrl-alt-cmd-6 = 'workspace 6'

    ctrl-alt-cmd-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    ctrl-alt-cmd-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    ctrl-alt-cmd-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    ctrl-alt-cmd-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
    ctrl-alt-cmd-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
    ctrl-alt-cmd-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'

    ctrl-alt-cmd-shift-c = 'reload-config'
