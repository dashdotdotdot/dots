
start-at-login = true
after-login-command = []
after-startup-command = [
  'exec-and-forget borders active_color=0xffff8b8b inactive_color=0xffa76f6f width=5.0 hidpi=on'
]
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]
key-mapping.preset = 'qwerty'

# // Disable fullscreen transition animations
#full-screen-api.transition-duration.enter = 0
#full-screen-api.transition-duration.leave = 0

# // add dragging
# defaults write -g NSWindowShouldDragOnGesture -bool true

# // disable window animations
# defaults write -g NSAutomaticWindowAnimationsEnabled -bool false

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

#automatically-unhide-macos-hidden-apps = true

[gaps]
outer.top =        5
outer.bottom =     10
outer.left =       10 #80
outer.right =      10
inner.horizontal = 10
inner.vertical =   10


# --- Auto-assign Helium profiles to workspaces ---

# CS profile → workspace 1
[[on-window-detected]]
if.app-id = "net.imput.helium"
if.window-title-regex-substring = "(?i)cs"
run = ["move-node-to-workspace 1"]

# Math profile → workspace 2
[[on-window-detected]]
if.app-id = "net.imput.helium"
if.window-title-regex-substring = "(?i)math"
run = ["move-node-to-workspace 2"]

# German profile → workspace 3
[[on-window-detected]]
if.app-id = "net.imput.helium"
if.window-title-regex-substring = "(?i)german"
run = ["move-node-to-workspace 3"]

# Personal profile → workspace 5
[[on-window-detected]]
if.app-id = "net.imput.helium"
if.window-title-regex-substring = "(?i)personal"
run = ["move-node-to-workspace 4"]

[[on-window-detected]]
if.app-id = "com.apple.mail"
run = ["move-node-to-workspace 5"]

[[on-window-detected]]
if.app-id = "com.apple.iCal"
run = ["move-node-to-workspace 6"]

# --- Move specific Obsidian windows to workspaces based on title ---

[[on-window-detected]]
if.app-id = "md.obsidian"
if.window-title-regex-substring = "(?i)cs"
run = ["move-node-to-workspace 1"]

[[on-window-detected]]
if.app-id = "md.obsidian"
if.window-title-regex-substring = "(?i)math"
run = ["move-node-to-workspace 2"]

[[on-window-detected]]
if.app-id = "md.obsidian"
if.window-title-regex-substring = "(?i)german"
run = ["move-node-to-workspace 3"]

